appId: com.nguyenkhanh.infracompanion
productName: Infra Companion
executableName: InfraCompanion
directories:
  output: release
  buildResources: build
files:
  - out/**
extraResources:
  # Nhúng icon vào resources để main set window icon lúc chạy (nút taskbar của cửa sổ đang chạy
  # dùng window icon; nếu không set, Windows lấy icon theo AUMID — có thể bị cache sai).
  - from: build/icon.ico
    to: icon.ico
asarUnpack:
  - "**/node_modules/node-pty/**"
  - "**/node_modules/@serialport/**"
  - "**/node_modules/serialport/**"
npmRebuild: false

publish:
  provider: github
  owner: xShiroeNguyenx
  repo: infra-companion
  releaseType: release

win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: InfraCompanion-Setup-${version}.${ext}

mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  artifactName: InfraCompanion-${version}.${ext}

linux:
  target:
    - AppImage
  category: Development
  artifactName: InfraCompanion-${version}.${ext}
