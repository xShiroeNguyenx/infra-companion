<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#080c12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle scanline texture overlay -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="none"
        stroke="#1e3a4a" stroke-width="1" opacity="0.15" clip-path="url(#round)"/>

  <!-- Top-left subtle highlight -->
  <ellipse cx="200" cy="160" rx="280" ry="160" fill="white" opacity="0.025"/>

  <!-- > chevron -->
  <path d="M 205 308 L 468 512 L 205 716"
        fill="none"
        stroke="url(#accent)"
        stroke-width="88"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- _ cursor bar -->
  <rect x="516" y="628" width="304" height="72" rx="18"
        fill="url(#accent)"
        filter="url(#softglow)"/>

  <!-- Decorative dot grid (subtle, bottom-right) -->
  <g opacity="0.12" fill="#22d3ee">
    <circle cx="820" cy="820" r="6"/><circle cx="860" cy="820" r="6"/><circle cx="900" cy="820" r="6"/>
    <circle cx="820" cy="860" r="6"/><circle cx="860" cy="860" r="6"/><circle cx="900" cy="860" r="6"/>
    <circle cx="820" cy="900" r="6"/><circle cx="860" cy="900" r="6"/><circle cx="900" cy="900" r="6"/>
  </g>
</svg>
