name: Secret Scan

# Quét secrets bằng gitleaks — lớp bổ sung cho GitHub Push Protection:
# quét CẢ lịch sử commit cũ + các pattern generic (entropy) mà Push Protection bỏ qua.
# CHỦ ĐÍCH không có paths-ignore: secrets hay lộ trong docs/markdown.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * 1' # sáng thứ 2 hàng tuần: quét lại toàn bộ lịch sử
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # để action comment kết quả lên PR

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # cần full history — schedule/dispatch quét mọi commit từ trước tới nay

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE chỉ bắt buộc với repo thuộc Organization;
          # repo cá nhân (User) dùng miễn phí, không cần secret này.
